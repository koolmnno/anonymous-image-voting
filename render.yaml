services:
  - type: web
    name: anonymous-image-voting-site
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: image-vote-storage
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /var/data/data
      - key: UPLOAD_DIR
        value: /var/data/uploads
