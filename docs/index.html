<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>匿名图片投票</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --card: rgba(255, 255, 255, 0.9);
        --text: #151927;
        --muted: #687083;
        --primary: #6657ff;
        --green: #16a36a;
        --border: #e1e5f2;
        --shadow: 0 20px 50px rgba(32, 39, 66, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(102, 87, 255, 0.2), transparent 34rem),
          linear-gradient(135deg, #f8fbff 0%, #eef1ff 100%);
      }

      .page {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0 72px;
      }

      .hero {
        min-height: 220px;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--primary);
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        max-width: 760px;
        margin-bottom: 16px;
        font-size: clamp(2.3rem, 6vw, 5rem);
        line-height: 0.96;
        letter-spacing: -0.06em;
      }

      .subtitle {
        max-width: 720px;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.8;
      }

      .notice {
        margin-top: 18px;
        padding: 14px 16px;
        border: 1px solid #ffe2a9;
        border-radius: 18px;
        color: #805600;
        background: #fff8e6;
        line-height: 1.7;
      }

      .panel {
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--card);
        box-shadow: var(--shadow);
      }

      .upload-form {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) minmax(260px, 1.2fr) auto;
        gap: 16px;
        align-items: end;
      }

      label {
        display: grid;
        gap: 8px;
        color: #30364a;
        font-weight: 700;
      }

      input[type="text"] {
        width: 100%;
        min-height: 48px;
        padding: 0 16px;
        border: 1px solid var(--border);
        border-radius: 16px;
        color: var(--text);
        font: inherit;
        background: #fff;
        outline: none;
      }

      .file-drop {
        min-height: 48px;
        padding: 0 16px;
        border: 1px dashed #b7bed5;
        border-radius: 16px;
        justify-content: center;
        color: var(--muted);
        background: #fff;
        cursor: pointer;
      }

      .file-drop input {
        display: none;
      }

      button {
        min-height: 48px;
        padding: 0 20px;
        border: 0;
        border-radius: 16px;
        color: #fff;
        font: inherit;
        font-weight: 800;
        background: var(--primary);
        cursor: pointer;
      }

      button.secondary {
        color: var(--primary);
        border: 1px solid var(--border);
        background: #fff;
      }

      button.danger {
        background: #c03434;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .message {
        min-height: 24px;
        margin: 14px 0 0;
        color: var(--muted);
      }

      .gallery-header {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: end;
        margin: 42px 0 18px;
      }

      .gallery-header p {
        margin-bottom: 0;
        color: var(--muted);
      }

      .gallery-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 22px;
      }

      .card {
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 26px;
        background: #fff;
        box-shadow: 0 18px 40px rgba(32, 39, 66, 0.1);
      }

      .card img {
        display: block;
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        background: #eef1ff;
      }

      .card-body {
        padding: 18px;
      }

      .card-title {
        margin-bottom: 14px;
        font-size: 1.05rem;
        word-break: break-word;
      }

      .vote-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .vote-count {
        color: var(--muted);
        font-weight: 700;
      }

      .vote-button {
        min-height: 42px;
        padding: 0 16px;
      }

      .vote-button.voted {
        background: var(--green);
      }

      .empty {
        grid-column: 1 / -1;
        padding: 52px 24px;
        border: 1px dashed #b7bed5;
        border-radius: 28px;
        text-align: center;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.56);
      }

      @media (max-width: 820px) {
        .page {
          width: min(100% - 24px, 1120px);
          padding-top: 28px;
        }

        .upload-form {
          grid-template-columns: 1fr;
        }

        .gallery-header {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">GitHub Pages</p>
        <h1>上传图片，匿名投票</h1>
        <p class="subtitle">这是 GitHub Pages 静态版，不需要服务器，所有图片和投票数据会保存在当前浏览器本地。</p>
        <p class="notice">注意：GitHub Pages 不提供后端数据库和文件存储，所以不同用户之间不会共享上传图片和投票结果。它适合演示、个人本地使用或静态展示。</p>
      </section>

      <section class="panel">
        <h2>上传图片</h2>
        <form id="uploadForm" class="upload-form">
          <label>
            图片标题
            <input id="titleInput" type="text" maxlength="60" placeholder="例如：我最喜欢的旅行照片" />
          </label>

          <label class="file-drop" for="imageInput">
            <input id="imageInput" type="file" accept="image/*" required />
            <span id="fileText">点击选择图片，建议小于 2MB</span>
          </label>

          <button type="submit">保存到本地展示</button>
        </form>
        <p id="message" class="message" role="status"></p>
      </section>

      <section class="gallery-header">
        <div>
          <h2>图片展示</h2>
          <p>按票数排序。数据保存在当前浏览器的 localStorage。</p>
        </div>
        <div class="gallery-actions">
          <button id="exportButton" class="secondary" type="button">导出数据</button>
          <button id="clearButton" class="danger" type="button">清空本地数据</button>
        </div>
      </section>

      <section id="gallery" class="gallery" aria-live="polite"></section>
    </main>

    <script>
      const STORAGE_KEY = "image_vote_pages_data";
      const ANON_KEY = "image_vote_pages_anon_id";
      const MAX_FILE_SIZE = 2 * 1024 * 1024;

      const gallery = document.querySelector("#gallery");
      const uploadForm = document.querySelector("#uploadForm");
      const titleInput = document.querySelector("#titleInput");
      const imageInput = document.querySelector("#imageInput");
      const fileText = document.querySelector("#fileText");
      const message = document.querySelector("#message");
      const exportButton = document.querySelector("#exportButton");
      const clearButton = document.querySelector("#clearButton");

      function getAnonId() {
        let id = localStorage.getItem(ANON_KEY);
        if (!id) {
          id = `${Date.now()}-${Math.random().toString(16).slice(2)}-${Math.random().toString(16).slice(2)}`;
          localStorage.setItem(ANON_KEY, id);
        }
        return id;
      }

      function readData() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { images: [] };
        } catch {
          return { images: [] };
        }
      }

      function writeData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function setMessage(text) {
        message.textContent = text;
      }

      function renderImages() {
        const anonId = getAnonId();
        const data = readData();
        const images = [...data.images].sort((a, b) => b.voters.length - a.voters.length || b.createdAt - a.createdAt);
        gallery.innerHTML = "";

        if (!images.length) {
          gallery.innerHTML = '<div class="empty"><h3>还没有图片</h3><p>上传第一张图片后，它会显示在这里。</p></div>';
          return;
        }

        for (const image of images) {
          const card = document.createElement("article");
          card.className = "card";
          const voted = image.voters.includes(anonId);
          card.innerHTML = `
            <img src="${image.dataUrl}" alt="${escapeHtml(image.title)}" loading="lazy" />
            <div class="card-body">
              <h3 class="card-title">${escapeHtml(image.title)}</h3>
              <div class="vote-row">
                <span class="vote-count">${image.voters.length} 票</span>
                <button class="vote-button ${voted ? "voted" : ""}" type="button" data-id="${image.id}">
                  ${voted ? "已投票" : "投票"}
                </button>
              </div>
            </div>
          `;
          gallery.appendChild(card);
        }
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      imageInput.addEventListener("change", () => {
        const file = imageInput.files[0];
        fileText.textContent = file ? file.name : "点击选择图片，建议小于 2MB";
      });

      uploadForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const file = imageInput.files[0];

        if (!file) {
          setMessage("请先选择一张图片。");
          return;
        }

        if (!file.type.startsWith("image/")) {
          setMessage("只能上传图片文件。");
          return;
        }

        if (file.size > MAX_FILE_SIZE) {
          setMessage("图片过大。GitHub Pages 静态版使用浏览器本地存储，建议图片小于 2MB。");
          return;
        }

        const dataUrl = await fileToDataUrl(file);
        const data = readData();
        data.images.push({
          id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
          title: titleInput.value.trim().slice(0, 60) || "未命名图片",
          dataUrl,
          createdAt: Date.now(),
          voters: []
        });
        writeData(data);
        uploadForm.reset();
        fileText.textContent = "点击选择图片，建议小于 2MB";
        setMessage("已保存到当前浏览器本地。");
        renderImages();
      });

      gallery.addEventListener("click", (event) => {
        const button = event.target.closest(".vote-button");
        if (!button) return;

        const anonId = getAnonId();
        const data = readData();
        const image = data.images.find((item) => item.id === button.dataset.id);
        if (!image) return;

        const index = image.voters.indexOf(anonId);
        if (index === -1) {
          image.voters.push(anonId);
        } else {
          image.voters.splice(index, 1);
        }

        writeData(data);
        renderImages();
      });

      exportButton.addEventListener("click", () => {
        const blob = new Blob([JSON.stringify(readData(), null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "image-vote-data.json";
        link.click();
        URL.revokeObjectURL(url);
      });

      clearButton.addEventListener("click", () => {
        if (!confirm("确定清空当前浏览器保存的图片和投票数据吗？")) return;
        localStorage.removeItem(STORAGE_KEY);
        setMessage("本地数据已清空。");
        renderImages();
      });

      getAnonId();
      renderImages();
    </script>
  </body>
</html>
