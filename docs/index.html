<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>匿名图片投票</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      :root {
        --bg: #f6f7fb;
        --card: rgba(255, 255, 255, 0.9);
        --text: #151927;
        --muted: #687083;
        --primary: #6657ff;
        --green: #16a36a;
        --border: #e1e5f2;
        --shadow: 0 20px 50px rgba(32, 39, 66, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(102, 87, 255, 0.2), transparent 34rem),
          linear-gradient(135deg, #f8fbff 0%, #eef1ff 100%);
      }

      .page {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0 72px;
      }

      .hero {
        min-height: 220px;
      }

      .top-bar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 22px;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--primary);
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        max-width: 760px;
        margin-bottom: 16px;
        font-size: clamp(2.3rem, 6vw, 5rem);
        line-height: 0.96;
        letter-spacing: -0.06em;
      }

      .subtitle {
        max-width: 720px;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.8;
      }

      .notice {
        margin-top: 18px;
        padding: 14px 16px;
        border: 1px solid #ffe2a9;
        border-radius: 18px;
        color: #805600;
        background: #fff8e6;
        line-height: 1.7;
      }

      .panel {
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--card);
        box-shadow: var(--shadow);
      }

      .upload-form {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) minmax(260px, 1.2fr) auto;
        gap: 16px;
        align-items: end;
      }

      .config-form {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      label {
        display: grid;
        gap: 8px;
        color: #30364a;
        font-weight: 700;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        min-height: 48px;
        padding: 0 16px;
        border: 1px solid var(--border);
        border-radius: 16px;
        color: var(--text);
        font: inherit;
        background: #fff;
        outline: none;
      }

      .file-drop {
        min-height: 48px;
        padding: 0 16px;
        border: 1px dashed #b7bed5;
        border-radius: 16px;
        justify-content: center;
        color: var(--muted);
        background: #fff;
        cursor: pointer;
      }

      .file-drop input {
        display: none;
      }

      button {
        min-height: 48px;
        padding: 0 20px;
        border: 0;
        border-radius: 16px;
        color: #fff;
        font: inherit;
        font-weight: 800;
        background: var(--primary);
        cursor: pointer;
      }

      button.secondary {
        color: var(--primary);
        border: 1px solid var(--border);
        background: #fff;
      }

      button.danger {
        background: #c03434;
      }

      .settings-backdrop {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(14, 18, 32, 0.42);
        backdrop-filter: blur(10px);
      }

      .settings-backdrop.open {
        display: flex;
      }

      .settings-dialog {
        width: min(720px, 100%);
        max-height: min(90vh, 760px);
        overflow: auto;
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: #fff;
        box-shadow: 0 30px 90px rgba(14, 18, 32, 0.28);
      }

      .settings-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 22px;
      }

      .settings-head p {
        margin-bottom: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .settings-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      .setting-help {
        margin-top: 16px;
        color: var(--muted);
        line-height: 1.7;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .message {
        min-height: 24px;
        margin: 14px 0 0;
        color: var(--muted);
      }

      .gallery-header {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: end;
        margin: 42px 0 18px;
      }

      .gallery-header p {
        margin-bottom: 0;
        color: var(--muted);
      }

      .gallery-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 22px;
      }

      .card {
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 26px;
        background: #fff;
        box-shadow: 0 18px 40px rgba(32, 39, 66, 0.1);
      }

      .card img {
        display: block;
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        background: #eef1ff;
      }

      .card-body {
        padding: 18px;
      }

      .card-title {
        margin-bottom: 14px;
        font-size: 1.05rem;
        word-break: break-word;
      }

      .vote-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .vote-count {
        color: var(--muted);
        font-weight: 700;
      }

      .vote-button {
        min-height: 42px;
        padding: 0 16px;
      }

      .vote-button.voted {
        background: var(--green);
      }

      .empty {
        grid-column: 1 / -1;
        padding: 52px 24px;
        border: 1px dashed #b7bed5;
        border-radius: 28px;
        text-align: center;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.56);
      }

      @media (max-width: 820px) {
        .page {
          width: min(100% - 24px, 1120px);
          padding-top: 28px;
        }

        .upload-form,
        .config-form {
          grid-template-columns: 1fr;
        }

        .gallery-header {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="top-bar">
        <button id="openLeaderboardButton" class="secondary" type="button">排行榜</button>
        <button id="openSettingsButton" class="secondary" type="button">设置</button>
      </div>

      <section class="panel">
        <h2>上传图片</h2>
        <form id="uploadForm" class="upload-form">
          <label>
            图片标题
            <input id="titleInput" type="text" maxlength="60" placeholder="例如：我最喜欢的旅行照片" />
          </label>

          <label class="file-drop" for="imageInput">
            <input id="imageInput" type="file" accept="image/*" required />
            <span id="fileText">点击选择图片，建议小于 8MB</span>
          </label>

          <button type="submit">上传到图床并展示</button>
        </form>
        <p id="message" class="message" role="status"></p>
      </section>

      <section class="gallery-header">
        <div>
          <h2>图片展示</h2>
          <p>上传图片后会显示在这里，按票数自动排序。</p>
        </div>
      </section>

      <section id="gallery" class="gallery" aria-live="polite"></section>
    </main>

    <section id="settingsBackdrop" class="settings-backdrop" aria-hidden="true">
      <div class="settings-dialog" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="settings-head">
          <div>
            <h2 id="settingsTitle">图床与共享数据库设置</h2>
            <p>配置 ImgBB 用于上传图片，配置 Bmob 用于多人共享图片列表和投票结果。</p>
          </div>
          <button id="closeSettingsButton" class="secondary" type="button">关闭</button>
        </div>

        <div class="config-form">
          <label>
            ImgBB API Key
            <input id="apiKeyInput" type="password" placeholder="粘贴你的 ImgBB API Key" />
          </label>
          <label>
            Bmob Application ID
            <input id="bmobAppIdInput" type="password" placeholder="粘贴 Bmob Application ID" />
          </label>
          <label>
            Bmob REST API Key
            <input id="bmobRestKeyInput" type="password" placeholder="粘贴 Bmob REST API Key" />
          </label>
        </div>

        <p class="setting-help">
          <strong id="modeText">正在检测数据模式...</strong><br />
          ImgBB 申请地址：<a href="https://api.imgbb.com/" target="_blank" rel="noopener">https://api.imgbb.com/</a>。
          Bmob 创建应用后，在“应用密钥”里复制 Application ID 和 REST API Key。
          这些配置只保存在当前浏览器。
        </p>

        <div class="settings-actions">
          <button id="exportButton" class="secondary" type="button">导出数据</button>
          <button id="clearButton" class="danger" type="button">清空本地数据</button>
          <button id="clearConfigButton" class="secondary" type="button">清除配置</button>
          <button id="saveConfigButton" type="button">保存配置</button>
        </div>
      </div>
    </section>

    <section id="leaderboardBackdrop" class="settings-backdrop" aria-hidden="true">
      <div class="settings-dialog leaderboard-dialog" role="dialog" aria-modal="true" aria-labelledby="leaderboardTitle">
        <div class="settings-head">
          <div>
            <h2 id="leaderboardTitle">排行榜</h2>
            <p>根据当前图片投票数自动排序，票数相同则新上传靠前。</p>
          </div>
          <button id="closeLeaderboardButton" class="secondary" type="button">关闭</button>
        </div>
        <div id="leaderboardList" class="leaderboard-list"></div>
      </div>
    </section>

    <script>
      const STORAGE_KEY = "image_vote_pages_data";
      const ANON_KEY = "image_vote_pages_anon_id";
      const IMGBB_KEY = "image_vote_imgbb_api_key";
      const BMOB_APP_ID_KEY = "image_vote_bmob_app_id";
      const BMOB_REST_KEY_KEY = "image_vote_bmob_rest_key";
      const BMOB_CLASS_URL = "https://api2.bmob.cn/1/classes/ImageVoteImage";
      const SETTINGS_PASSWORD = "zy78054054";
      const MAX_FILE_SIZE = 8 * 1024 * 1024;

      const gallery = document.querySelector("#gallery");
      const uploadForm = document.querySelector("#uploadForm");
      const settingsBackdrop = document.querySelector("#settingsBackdrop");
      const leaderboardBackdrop = document.querySelector("#leaderboardBackdrop");
      const openSettingsButton = document.querySelector("#openSettingsButton");
      const closeSettingsButton = document.querySelector("#closeSettingsButton");
      const openLeaderboardButton = document.querySelector("#openLeaderboardButton");
      const closeLeaderboardButton = document.querySelector("#closeLeaderboardButton");
      const apiKeyInput = document.querySelector("#apiKeyInput");
      const bmobAppIdInput = document.querySelector("#bmobAppIdInput");
      const bmobRestKeyInput = document.querySelector("#bmobRestKeyInput");
      const saveConfigButton = document.querySelector("#saveConfigButton");
      const clearConfigButton = document.querySelector("#clearConfigButton");
      const titleInput = document.querySelector("#titleInput");
      const imageInput = document.querySelector("#imageInput");
      const fileText = document.querySelector("#fileText");
      const message = document.querySelector("#message");
      const modeText = document.querySelector("#modeText");
      const exportButton = document.querySelector("#exportButton");
      const clearButton = document.querySelector("#clearButton");
      const leaderboardList = document.querySelector("#leaderboardList");
      let currentImages = [];

      function getAnonId() {
        let id = localStorage.getItem(ANON_KEY);
        if (!id) {
          id = `${Date.now()}-${Math.random().toString(16).slice(2)}-${Math.random().toString(16).slice(2)}`;
          localStorage.setItem(ANON_KEY, id);
        }
        return id;
      }

      function readData() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { images: [] };
        } catch {
          return { images: [] };
        }
      }

      function writeData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function setMessage(text) {
        message.textContent = text;
      }

      function openSettings() {
        settingsBackdrop.classList.add("open");
        settingsBackdrop.setAttribute("aria-hidden", "false");
        apiKeyInput.focus();
      }

      function requestOpenSettings() {
        const password = prompt("请输入设置密码");
        if (password !== SETTINGS_PASSWORD) {
          setMessage("设置密码错误，无法打开设置。");
          return;
        }
        openSettings();
      }

      function closeSettings() {
        settingsBackdrop.classList.remove("open");
        settingsBackdrop.setAttribute("aria-hidden", "true");
      }

      function openLeaderboard() {
        renderLeaderboard();
        leaderboardBackdrop.classList.add("open");
        leaderboardBackdrop.setAttribute("aria-hidden", "false");
      }

      function closeLeaderboard() {
        leaderboardBackdrop.classList.remove("open");
        leaderboardBackdrop.setAttribute("aria-hidden", "true");
      }

      function getApiKey() {
        return localStorage.getItem(IMGBB_KEY) || "";
      }

      function getBmobConfig() {
        return {
          appId: localStorage.getItem(BMOB_APP_ID_KEY) || "",
          restKey: localStorage.getItem(BMOB_REST_KEY_KEY) || ""
        };
      }

      function hasBmobConfig() {
        const config = getBmobConfig();
        return Boolean(config.appId && config.restKey);
      }

      function saveConfig() {
        const imgbbKey = apiKeyInput.value.trim();
        const bmobAppId = bmobAppIdInput.value.trim();
        const bmobRestKey = bmobRestKeyInput.value.trim();

        if (!imgbbKey) {
          localStorage.removeItem(IMGBB_KEY);
        } else {
          localStorage.setItem(IMGBB_KEY, imgbbKey);
        }

        if (!bmobAppId || !bmobRestKey) {
          localStorage.removeItem(BMOB_APP_ID_KEY);
          localStorage.removeItem(BMOB_REST_KEY_KEY);
        } else {
          localStorage.setItem(BMOB_APP_ID_KEY, bmobAppId);
          localStorage.setItem(BMOB_REST_KEY_KEY, bmobRestKey);
        }

        setMessage(hasBmobConfig() ? "配置已保存：当前使用 Bmob 云端共享模式。" : "配置已保存：当前使用浏览器本地模式。");
        closeSettings();
        updateModeText();
        loadImages();
      }

      function clearConfig() {
        if (!confirm("确定清除 ImgBB 和 Bmob 配置吗？")) return;
        localStorage.removeItem(IMGBB_KEY);
        localStorage.removeItem(BMOB_APP_ID_KEY);
        localStorage.removeItem(BMOB_REST_KEY_KEY);
        apiKeyInput.value = "";
        bmobAppIdInput.value = "";
        bmobRestKeyInput.value = "";
        setMessage("配置已清除，当前使用浏览器本地模式。");
        closeSettings();
        updateModeText();
        loadImages();
      }

      function updateModeText() {
        modeText.textContent = hasBmobConfig()
          ? "共享模式：图片列表和投票数据保存在 Bmob 云数据库，所有访问者共享。"
          : "本地模式：未配置 Bmob，图片列表和投票数据只保存在当前浏览器。";
      }

      function normalizeBmobImage(item) {
        return {
          id: item.objectId,
          title: item.title,
          url: item.url,
          originalUrl: item.originalUrl,
          deleteUrl: item.deleteUrl,
          createdAt: new Date(item.createdAt || item.createdAtMs || Date.now()).getTime(),
          voters: Array.isArray(item.voters) ? item.voters : []
        };
      }

      function bmobHeaders() {
        const config = getBmobConfig();
        return {
          "X-Bmob-Application-Id": config.appId,
          "X-Bmob-REST-API-Key": config.restKey,
          "Content-Type": "application/json"
        };
      }

      async function bmobRequest(url, options = {}) {
        const response = await fetch(url, {
          ...options,
          headers: {
            ...bmobHeaders(),
            ...(options.headers || {})
          }
        });
        const result = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(result.error || "Bmob 请求失败，请检查密钥和应用配置。");
        }

        return result;
      }

      async function fetchCloudImages() {
        const params = new URLSearchParams({
          order: "-createdAt",
          limit: "500"
        });
        const result = await bmobRequest(`${BMOB_CLASS_URL}?${params.toString()}`);
        return (result.results || []).map(normalizeBmobImage);
      }

      async function createCloudImage(image) {
        await bmobRequest(BMOB_CLASS_URL, {
          method: "POST",
          body: JSON.stringify({
            title: image.title,
            url: image.url,
            originalUrl: image.originalUrl,
            deleteUrl: image.deleteUrl,
            createdAtMs: image.createdAt,
            voters: []
          })
        });
      }

      async function toggleCloudVote(id) {
        const anonId = getAnonId();
        const current = await bmobRequest(`${BMOB_CLASS_URL}/${id}`);
        const voters = Array.isArray(current.voters) ? current.voters : [];
        const voted = !voters.includes(anonId);
        await bmobRequest(`${BMOB_CLASS_URL}/${id}`, {
          method: "PUT",
          body: JSON.stringify({
            voters: voted
              ? { __op: "AddUnique", objects: [anonId] }
              : { __op: "Remove", objects: [anonId] }
          })
        });
        return voted;
      }

      async function loadImages() {
        updateModeText();

        if (!hasBmobConfig()) {
          renderImages(readData().images);
          return;
        }

        gallery.innerHTML = '<div class="empty"><h3>正在加载</h3><p>正在从 Bmob 获取共享图片和投票数据...</p></div>';

        try {
          const images = await fetchCloudImages();
          renderImages(images);
        } catch (error) {
          setMessage(error.message || "云端数据加载失败，已切换显示本地数据。");
          renderImages(readData().images);
        }
      }

      function renderImages(sourceImages) {
        const anonId = getAnonId();
        const images = [...(sourceImages || [])].sort((a, b) => b.voters.length - a.voters.length || b.createdAt - a.createdAt);
        currentImages = images;
        gallery.innerHTML = "";

        if (!images.length) {
          gallery.innerHTML = '<div class="empty"><h3>还没有图片</h3><p>上传第一张图片后，它会显示在这里。</p></div>';
          return;
        }

        for (const image of images) {
          const card = document.createElement("article");
          card.className = "card";
          const voted = image.voters.includes(anonId);
          card.innerHTML = `
            <img src="${image.url || image.dataUrl}" alt="${escapeHtml(image.title)}" loading="lazy" />
            <div class="card-body">
              <h3 class="card-title">${escapeHtml(image.title)}</h3>
              <div class="vote-row">
                <span class="vote-count">${image.voters.length} 票</span>
                <button class="vote-button ${voted ? "voted" : ""}" type="button" data-id="${image.id}">
                  ${voted ? "已投票" : "投票"}
                </button>
              </div>
            </div>
          `;
          gallery.appendChild(card);
        }
      }

      function renderLeaderboard() {
        const images = [...currentImages].sort((a, b) => b.voters.length - a.voters.length || b.createdAt - a.createdAt);

        if (!images.length) {
          leaderboardList.innerHTML = '<div class="empty"><h3>暂无排行</h3><p>上传图片并获得投票后，这里会显示排行榜。</p></div>';
          return;
        }

        leaderboardList.innerHTML = images
          .map((image, index) => `
            <article class="leaderboard-item">
              <div class="rank-badge">${index + 1}</div>
              <img src="${image.url || image.dataUrl}" alt="${escapeHtml(image.title)}" loading="lazy" />
              <div class="leaderboard-info">
                <h3>${escapeHtml(image.title)}</h3>
                <p>${image.voters.length} 票</p>
              </div>
            </article>
          `)
          .join("");
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      async function uploadToImgBB(file, apiKey) {
        const dataUrl = await fileToDataUrl(file);
        const base64 = dataUrl.split(",")[1];
        const formData = new FormData();
        formData.append("image", base64);
        formData.append("name", file.name.replace(/\.[^.]+$/, "").slice(0, 80) || "image-vote");

        const response = await fetch(`https://api.imgbb.com/1/upload?key=${encodeURIComponent(apiKey)}`, {
          method: "POST",
          body: formData
        });
        const result = await response.json();

        if (!response.ok || !result.success) {
          throw new Error(result.error?.message || "图床上传失败，请检查 API Key。");
        }

        return {
          url: result.data.url,
          displayUrl: result.data.display_url,
          deleteUrl: result.data.delete_url
        };
      }

      imageInput.addEventListener("change", () => {
        const file = imageInput.files[0];
        fileText.textContent = file ? file.name : "点击选择图片，建议小于 8MB";
      });

      uploadForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const file = imageInput.files[0];
        const apiKey = getApiKey();

        if (!file) {
          setMessage("请先选择一张图片。");
          return;
        }

        if (!apiKey) {
          setMessage("请先点击右上角设置，输入密码后填写并保存 ImgBB API Key。");
          return;
        }

        if (!file.type.startsWith("image/")) {
          setMessage("只能上传图片文件。");
          return;
        }

        if (file.size > MAX_FILE_SIZE) {
          setMessage("图片过大。当前限制为 8MB。");
          return;
        }

        const submitButton = uploadForm.querySelector("button[type='submit']");
        submitButton.disabled = true;
        setMessage("正在上传到 ImgBB 图床...");

        try {
          const uploadResult = await uploadToImgBB(file, apiKey);
          const image = {
            id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
            title: titleInput.value.trim().slice(0, 60) || "未命名图片",
            url: uploadResult.displayUrl || uploadResult.url,
            originalUrl: uploadResult.url,
            deleteUrl: uploadResult.deleteUrl,
            createdAt: Date.now(),
            voters: []
          };

          if (hasBmobConfig()) {
            setMessage("图片已上传到图床，正在写入 Bmob 共享数据库...");
            await createCloudImage(image);
          } else {
            const data = readData();
            data.images.push(image);
            writeData(data);
          }

          uploadForm.reset();
          fileText.textContent = "点击选择图片，建议小于 8MB";
          setMessage(hasBmobConfig() ? "图片已上传并同步到共享数据库。" : "图片已上传到图床，并保存到当前浏览器本地。");
          await loadImages();
        } catch (error) {
          setMessage(error.message || "图床上传失败。");
        } finally {
          submitButton.disabled = false;
        }
      });

      gallery.addEventListener("click", (event) => {
        const button = event.target.closest(".vote-button");
        if (!button) return;

        if (hasBmobConfig()) {
          button.disabled = true;
          setMessage("正在同步投票...");
          toggleCloudVote(button.dataset.id)
            .then(() => {
              setMessage("投票已同步。");
              return loadImages();
            })
            .catch((error) => {
              setMessage(error.message || "云端投票失败。");
            })
            .finally(() => {
              button.disabled = false;
            });
          return;
        }

        const anonId = getAnonId();
        const data = readData();
        const image = data.images.find((item) => item.id === button.dataset.id);
        if (!image) return;

        const index = image.voters.indexOf(anonId);
        if (index === -1) {
          image.voters.push(anonId);
        } else {
          image.voters.splice(index, 1);
        }

        writeData(data);
        renderImages(data.images);
      });

      exportButton.addEventListener("click", () => {
        const blob = new Blob([JSON.stringify({ images: currentImages }, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "image-vote-data.json";
        link.click();
        URL.revokeObjectURL(url);
      });

      clearButton.addEventListener("click", () => {
        if (hasBmobConfig()) {
          alert("共享模式下不能在页面里一键清空云端数据库。请到 Bmob 控制台管理数据。");
          return;
        }

        if (!confirm("确定清空当前浏览器保存的图片和投票数据吗？")) return;
        localStorage.removeItem(STORAGE_KEY);
        setMessage("本地数据已清空。");
        renderImages([]);
      });

      apiKeyInput.value = getApiKey();
      bmobAppIdInput.value = getBmobConfig().appId;
      bmobRestKeyInput.value = getBmobConfig().restKey;
      openSettingsButton.addEventListener("click", requestOpenSettings);
      closeSettingsButton.addEventListener("click", closeSettings);
      openLeaderboardButton.addEventListener("click", openLeaderboard);
      closeLeaderboardButton.addEventListener("click", closeLeaderboard);
      clearConfigButton.addEventListener("click", clearConfig);
      saveConfigButton.addEventListener("click", saveConfig);
      settingsBackdrop.addEventListener("click", (event) => {
        if (event.target === settingsBackdrop) closeSettings();
      });
      leaderboardBackdrop.addEventListener("click", (event) => {
        if (event.target === leaderboardBackdrop) closeLeaderboard();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeSettings();
          closeLeaderboard();
        }
      });
      getAnonId();
      loadImages();
    </script>
  </body>
</html>
